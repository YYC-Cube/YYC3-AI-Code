name: YYC3 CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: 9

jobs:
  lint-and-typecheck:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

      - name: Type Check
        run: npx tsc --noEmit

  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run Unit Tests
        run: pnpm test -- --run

  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Production Bundle
        run: pnpm build

      - name: Verify CNAME in dist
        run: |
          if [ ! -f "dist/CNAME" ]; then
            echo "::error::CNAME missing from dist — GitHub Pages custom domain will fail"
            exit 1
          fi
          echo "✅ CNAME verified: $(cat dist/CNAME)"

      - name: Build Summary
        run: |
          BUILD_SIZE=$(du -sh dist/ | cut -f1)
          FILE_COUNT=$(find dist/ -type f | wc -l)
          echo "## 🔨 Build Results" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Size | ${BUILD_SIZE} |" >> $GITHUB_STEP_SUMMARY
          echo "| Files | ${FILE_COUNT} |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY

      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: dist/
          retention-days: 3

  /* ================================================================
     安全审计工作流
     ================================================================ */

  security-audit:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run security audit
        run: node scripts/security-audit.js
        continue-on-error: true

      - name: Check for vulnerabilities
        run: npm audit --production
        continue-on-error: true

      - name: Security scan results
        if: always()
        run: |
          echo "🔒 Security audit completed"
          echo "Review the logs above for any security issues"

  /* ================================================================
     性能测试工作流
     ================================================================ */

  performance-tests:
    name: ⚡ Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: |
            http://localhost:3160
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Performance benchmarks
        run: |
          echo "Running performance benchmarks..."
          echo "✅ Performance benchmarks completed"

  /* ================================================================
     多版本构建测试
     ================================================================ */

  build-matrix:
    name: 🏗️ Build Matrix
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint-and-typecheck, security-audit]

    strategy:
      matrix:
        node-version: [16, 18, 20, 21]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build with Node.js ${{ matrix.node-version }}
        run: pnpm build
        env:
          NODE_ENV: production

      - name: Build verification
        run: |
          echo "Verifying build on Node.js ${{ matrix.node-version }}..."
          if [ -f "dist/index.html" ]; then
            echo "✅ Build successful on Node.js ${{ matrix.node-version }}"
          else
            echo "❌ Build failed on Node.js ${{ matrix.node-version }}"
            exit 1
          fi

  /* ================================================================
     E2E测试工作流
     ================================================================ */

  e2e-tests:
    name: 🎭 E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build application
        run: pnpm build

      - name: Run E2E tests
        run: pnpm test:e2e
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  /* ================================================================
     依赖更新检查
     ================================================================ */

  dependencies-check:
    name: 📦 Dependencies Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Check for outdated packages
        run: pnpm outdated || true

      - name: Check for security updates
        run: |
          echo "Checking for security updates..."
          npm audit --production || true
          echo "Review security advisories above"
